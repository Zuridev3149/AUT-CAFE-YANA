services:
  # Memoria del sistema (Base de datos)
  db_yana:
    image: postgres:15-alpine
    container_name: db_yana
    restart: always
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=yana_pass
      - POSTGRES_DB=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # El Cerebro Visual (n8n)
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_yana
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/La_Paz 
    volumes:
      - n8n_data:/home/node/.n8n

  # El Músculo (WhatsApp API)
  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db_yana
    environment:
      - SERVER_TYPE=http
      - CACHE_REDIS_ENABLED=false
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=yana_secret_key
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE
      - CORS_CREDENTIALS=true
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://root:yana_pass@db_yana:5432/evolution?sslmode=disable
      - DATABASE_SAVE_DATA_INSTANCE=true
      # ✅ LA CLAVE: Esto enciende la interfaz web de la API
      - SWAGGER_ENABLED=true 
    volumes:
      - evolution_instances:/evolution/instances

  # 🚀 NUEVO: El Cerebro en Python integrado al ecosistema Yana
  cerebro_python:
    image: python:3.11-slim-bullseye
    container_name: yana_python_bot
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - evolution_api
    volumes:
      - C:/Proyectos/Aut-Cafe-Yana:/app 
    working_dir: /app
    command: sh -c "apt-get update && apt-get install -y wkhtmltopdf && pip install requests flask imgkit && python -u main.py"

volumes:
  n8n_data:
  evolution_instances:
  postgres_data: