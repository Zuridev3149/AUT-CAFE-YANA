<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cafetería Yana – Promoción de Temporada</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brown-dark:   #2b1616;
      --brown-card:   #3d1a1a;
      --brown-medium: #522525;
      --gold:         #c9a84c;
      --gold-light:   #e2c97e;
      --cream:        #f5ead4;
      --orange-leaf:  #b86b32;
      --orange-light: #d99152;
    }

    body {
      background: var(--brown-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
    }

    /* ── CARD ── */
    .card {
      width: 400px;
      height: 480px;
      background: var(--brown-card);
      border: 3px solid var(--gold);
      border-radius: 6px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 22px 28px 20px;
      overflow: hidden;
      animation: fadeIn 1.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(.96) translateY(12px); }
      to   { opacity: 1; transform: scale(1)  translateY(0); }
    }

    /* ── DECORATIVE LEAVES (Reemplaza Bunting de cumple) ── */
    .bunting {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 30px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 0;
    }
    .bunting::before,
    .bunting::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 10%; right: 10%;
      border-top: 1.5px dashed var(--orange-leaf);
    }
    .flag {
      width: 0;
      height: 0;
      border-left:  10px solid transparent;
      border-right: 10px solid transparent;
      border-top:   16px solid var(--orange-leaf);
      margin: 0 2px;
      animation: flagDrop .6s ease both;
    }
    .flag:nth-child(odd)  { border-top-color: var(--orange-leaf); }
    .flag:nth-child(even) { border-top-color: var(--orange-light); }
    @keyframes flagDrop {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .flag:nth-child(1)  { animation-delay:.05s }
    .flag:nth-child(2)  { animation-delay:.10s }
    .flag:nth-child(3)  { animation-delay:.15s }
    .flag:nth-child(4)  { animation-delay:.20s }
    .flag:nth-child(5)  { animation-delay:.25s }
    .flag:nth-child(6)  { animation-delay:.30s }
    .flag:nth-child(7)  { animation-delay:.35s }
    .flag:nth-child(8)  { animation-delay:.40s }
    .flag:nth-child(9)  { animation-delay:.45s }
    .flag:nth-child(10) { animation-delay:.50s }
    .flag:nth-child(11) { animation-delay:.55s }
    .flag:nth-child(12) { animation-delay:.60s }
    .flag:nth-child(13) { animation-delay:.65s }

    /* ── TOP SECTION: cup + brand ── */
    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 18px;
      gap: 6px;
    }

    /* Steam */
    .steam-wrap {
      display: flex;
      gap: 7px;
      height: 22px;
      align-items: flex-end;
    }
    .steam {
      width: 3px;
      border-radius: 2px;
      background: var(--cream);
      opacity: .55;
      animation: steam 2s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .steam:nth-child(1) { height: 14px; animation-delay: 0s; }
    .steam:nth-child(2) { height: 20px; animation-delay: .3s; }
    .steam:nth-child(3) { height: 12px; animation-delay: .6s; }
    @keyframes steam {
      0%,100% { transform: scaleY(1)   translateY(0); opacity:.55; }
      50%      { transform: scaleY(.6) translateY(-4px); opacity:.2; }
    }

    /* Cup SVG */
    .cup-svg {
      width: 72px;
      height: 58px;
    }

    .brand-name {
      font-family: 'Cinzel', serif;
      color: var(--cream);
      font-size: 1.25rem;
      letter-spacing: .12em;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,.4);
    }

    /* ── SEASON BOX ── */
    .season-box {
      width: 100%;
      border: 1.5px solid var(--gold);
      border-radius: 4px;
      padding: 12px 16px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      background: transparent;
    }
    /* Corner diamonds */
    .season-box::before,
    .season-box::after {
      content: '✦';
      position: absolute;
      color: var(--gold);
      font-size: .55rem;
      top: 50%; transform: translateY(-50%);
    }
    .season-box::before { left: 8px; }
    .season-box::after  { right: 8px; }

    .especial {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .28em;
      color: var(--gold-light);
      text-transform: uppercase;
      font-weight: 700;
    }

    .season-name {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: .2em;
      color: var(--cream);
      line-height: 1.2;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
      animation: nameGlow 3s ease-in-out infinite alternate;
    }
    @keyframes nameGlow {
      from { text-shadow: 0 2px 8px rgba(0,0,0,.5); }
      to   { text-shadow: 0 0 18px rgba(201,168,76,.3), 0 2px 8px rgba(0,0,0,.5); }
    }

    /* ── DATES BLOCK ── */
    .season-dates {
      font-family: 'Lato', sans-serif;
      font-size: .62rem;
      font-weight: 400;
      letter-spacing: .12em;
      color: var(--cream);
      opacity: 0.85;
      text-transform: uppercase;
      border-top: 1px solid rgba(245, 234, 212, 0.2);
      padding-top: 6px;
      margin-top: 2px;
      width: 80%;
      text-align: center;
    }

    /* ── BENEFICIO (DESCUENTO 10%) ── */
    .regalo {
      width: 100%;
      margin-top: 6px;
      border-top: 1px dashed rgba(201,168,76,.4);
      padding-top: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      animation: fadeInUp .8s ease .6s both;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .regalo-label {
      font-family: 'Lato', sans-serif;
      font-size: .58rem;
      font-weight: 300;
      letter-spacing: .18em;
      color: var(--gold-light);
      text-transform: uppercase;
      opacity: .8;
    }
    .regalo-producto {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--cream);
      letter-spacing: .05em;
      text-align: center;
    }
    .regalo-emoji {
      font-size: 1.2rem;
      animation: bounce 1.8s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }

    /* ── COFFEE BEANS ── */
    .beans-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      width: 100%;
      opacity: .75;
    }
    .bean {
      width: 26px;
      height: 16px;
    }

    /* ── BOTTOM TEXT ── */
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding-bottom: 4px;
    }
    .con-amor {
      font-family: 'Lato', sans-serif;
      font-size: .65rem;
      font-weight: 300;
      color: var(--cream);
      letter-spacing: .1em;
      opacity: .8;
    }
    .brand-bottom {
      font-family: 'Cinzel', serif;
      font-size: .8rem;
      color: var(--gold-light);
      letter-spacing: .12em;
      font-weight: 700;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="bunting">
    <div class="flag"></div><div class="flag"></div><div class="flag"></div>
    <div class="flag"></div><div class="flag"></div><div class="flag"></div>
    <div class="flag"></div><div class="flag"></div><div class="flag"></div>
    <div class="flag"></div><div class="flag"></div><div class="flag"></div>
    <div class="flag"></div>
  </div>

  <div class="top">
    <div class="steam-wrap">
      <div class="steam"></div>
      <div class="steam"></div>
      <div class="steam"></div>
    </div>

    <svg class="cup-svg" viewBox="0 0 72 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="36" cy="52" rx="30" ry="5" stroke="#f5ead4" stroke-width="1.5" fill="none"/>
      <path d="M14 24 L18 48 H54 L58 24 Z" stroke="#f5ead4" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
      <ellipse cx="36" cy="24" rx="22" ry="4" stroke="#f5ead4" stroke-width="1.5" fill="none"/>
      <path d="M58 30 Q72 30 72 38 Q72 46 58 44" stroke="#f5ead4" stroke-width="1.5" fill="none"/>
    </svg>

    <span class="brand-name">Kafe Yana</span>
  </div>

  <div class="season-box">
    <span class="especial">Promoción Especial</span>
    <span class="season-name">{{nombre_temporada}}</span>
    
    <div class="season-dates">
      Válido desde: {{fecha_inicio}} <br> hasta: {{fecha_fin}}
    </div>
  </div>

  <div class="regalo">
    <span class="regalo-label">🍂 Beneficio de Temporada</span>
    <span class="regalo-emoji">🍁</span>
    <span class="regalo-producto">10% DE DESCUENTO</span>
    <span class="regalo-label">En todas tus compras · Presentar en caja</span>
  </div>

  <div class="beans-row">
    <svg class="bean" viewBox="0 0 26 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="13" cy="8" rx="12" ry="7" fill="#6b4226" stroke="#c9a84c" stroke-width="1"/>
      <path d="M13 2 Q10 8 13 14" stroke="#c9a84c" stroke-width="1" fill="none"/>
    </svg>
    <svg class="bean" viewBox="0 0 26 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="13" cy="8" rx="12" ry="7" fill="#6b4226" stroke="#c9a84c" stroke-width="1"/>
      <path d="M13 2 Q16 8 13 14" stroke="#c9a84c" stroke-width="1" fill="none"/>
    </svg>
  </div>

  <div class="bottom">
    <span class="con-amor">Disfruta la calidez de nuestro café</span>
    <span class="brand-bottom">Kafe Yana</span>
  </div>

</div>

</body>
</html>
